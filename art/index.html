<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SketchWall - 頂級奢華藝術畫廊</title>
</head>
<body class="dark-theme">

  <div id="welcomeOverlay" class="welcome-container">
    <div class="welcome-scroll-wrapper">
      <div class="welcome-card">
        <div class="brand-logo">✨</div>
        <h1>SketchWall</h1>
        <p>在無限的數位畫布上，釋放你的靈感與美學意識。</p>
        <button id="btnStartExplore" class="prime-btn">開始創作 🎨</button>
      </div>

      <div class="gallery-section">
        <div class="gallery-header">
          <span class="gallery-badge">MUSEUM EXHIBITION</span>
          <h2>線上當代藝術牆</h2>
          <p>歷史創作永久收藏於此，點擊作品卡片可進行【查看、編輯、刪除、下載】。</p>
        </div>
        <div id="galleryGrid" class="gallery-grid">
          <div id="emptyGalleryText" class="empty-text">目前尚無展出作品，快開啟創作留下你的第一幅鉅作！</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-creative-section">
    <div class="canvas-wrapper">
      <canvas id="paintCanvas"></canvas>
    </div>

    <div id="toolbar" class="glass-panel hidden-ui">
      <div class="ui-group">
        <button id="btnThemeToggle" title="切換黑白畫布與主題">🌙</button>
      </div>

      <div class="divider"></div>

      <div class="select-group">
        <select id="selectTool" class="premium-select">
          <option value="pencil">✏️ 鉛筆模式</option>
          <option value="marker">🖌️ 麥克筆模式</option>
          <option value="highlighter">✨ 螢光筆模式</option>
          <option value="eraser">🧽 橡皮擦模式</option>
        </select>
      </div>

      <div class="divider"></div>

      <div class="color-group">
        <div class="color-dot active" data-color="#00ffcc" style="background-color: #00ffcc;"></div>
        <div class="color-dot" data-color="#ff007f" style="background-color: #ff007f;"></div>
        <div class="color-dot" data-color="#00a2ff" style="background-color: #00a2ff;"></div>
        <div class="color-dot" data-color="#ffb700" style="background-color: #ffb700;"></div>
        <div class="color-dot" data-color="#9d4edd" style="background-color: #9d4edd;"></div>
        <div class="color-dot" id="dynamicWhiteBlack" data-color="#ffffff" style="background-color: #ffffff;"></div>
      </div>

      <div class="divider"></div>

      <div class="range-group">
        <span>粗細</span>
        <input type="range" id="sizeSlider" min="1" max="60" value="6">
        <span id="sizeValue">6px</span>
      </div>

      <div class="divider"></div>

      <div class="action-group">
        <button id="btnUndo">↩️ 復原</button>
        <button id="btnClear">🗑️ 清空</button>
        <button id="btnSave" class="save-highlight">💾 發表作品</button>
      </div>
    </div>
  </div>

  <div id="saveModal" class="modal-overlay">
    <div class="premium-showcase-card">
      <button id="btnCloseModal" class="close-card-btn">&times;</button>
      <div class="showcase-left">
        <div class="art-frame">
          <img id="previewImage" src="" alt="你的畫作預覽">
        </div>
      </div>
      <div class="showcase-right">
        <div class="meta-header">
          <span class="badge">WALL OF FAME</span>
          <h2>發表你的靈感</h2>
        </div>
        <div class="input-fieldset">
          <label for="authorName">創作者署名</label>
          <input type="text" id="authorName" placeholder="輸入你的藝術家暱稱..." value="匿名創作者">
        </div>
        <div class="input-fieldset">
          <label for="authorComment">創作自白 / 留言</label>
          <textarea id="authorComment" rows="3" placeholder="寫下這幅作品背後的故事..."></textarea>
        </div>
        <div class="interactive-stats">
          <button id="modalLikeBtn" class="like-btn">❤️ <span id="likeCount">0</span> 個讚</button>
          <span id="currentTimeStamp" class="timestamp">發布時間: --:--</span>
        </div>
        <button id="btnConfirmSubmit" class="submit-art-btn">收藏至藝術大畫廊 ✨</button>
      </div>
    </div>
  </div>

  <div id="viewModal" class="modal-overlay">
    <div class="premium-showcase-card">
      <button id="btnCloseViewModal" class="close-card-btn">&times;</button>
      <div class="showcase-left">
        <div class="art-frame">
          <img id="viewImage" src="" alt="展出畫作大圖">
        </div>
      </div>
      <div class="showcase-right">
        <div class="meta-header">
          <span class="badge" id="viewBadge">ARTWORK DETAILS</span>
          <h2>管理你的作品</h2>
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorName">創作者署名</label>
          <input type="text" id="viewAuthorName" placeholder="修改藝術家暱稱...">
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorComment">創作自白 / 留言</label>
          <textarea id="viewAuthorComment" rows="3" placeholder="修改作品故事..."></textarea>
        </div>
        <div class="interactive-stats">
          <span id="viewTimeStamp" class="timestamp">發布時間: --:--</span>
          <span id="viewThemeTag" class="timestamp">主題: --</span>
        </div>
        
        <div class="management-btn-group">
          <button id="btnDownloadArt" class="manage-btn download">📥 下載作品</button>
          <button id="btnUpdateArt" class="manage-btn update">💾 儲存修改</button>
          <button id="btnDeleteArt" class="manage-btn delete">🗑️ 刪除作品</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
