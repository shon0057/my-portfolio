<!DOCTYPE html>
<html lang="zh-TW">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SketchWall - 頂級奢華藝術畫廊</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B11u1nql.css">
</head>
<body class="dark-theme">

  <a href="../index.html#projects" id="btnBackToPortfolio" class="back-portfolio-btn">
    <span>🏠 返回作品集主頁</span>
  </a>

  <div id="welcomeOverlay" class="welcome-container">
    <div class="welcome-scroll-wrapper">
      
      <div class="welcome-card">
        <div class="brand-logo">🎨</div>
        <h1>SketchWall</h1>
        <p>歡迎來到極簡輕奢藝術畫廊。在這裡，您可以盡情釋放內心的色彩，將轉瞬即逝的靈感永遠刻印在雲端當代牆上。</p>
        <button id="btnStartExplore" class="prime-btn">進入創作世界 🚀</button>
      </div>
      
      <section class="gallery-section">
        <div class="gallery-header">
          <span class="gallery-badge">CONTEMPORARY EXHIBITION</span>
          <h2>當代線上藝術牆</h2>
          <p>匯聚全球創作者的靈感瞬間，點擊作品可進行收藏或管理</p>
        </div>
        
        <div id="galleryGrid" class="gallery-grid"></div>
        <p id="emptyGalleryText" class="empty-text" style="display:none;">美術館目前空無一人，等待您留下第一筆驚世之作...</p>
      </section>
      
    </div>
  </div>

  <canvas id="paintCanvas"></canvas>

  <div id="toolbar" class="toolbar-container hidden-ui">
    <div class="tool-group">
      <select id="selectTool" class="premium-select">
        <option value="pencil">🖋️ 奢華鋼筆</option>
        <option value="highlighter">🖍️ 螢光典藏筆</option>
        <option value="eraser">🧽 靈感橡皮擦</option>
      </select>
    </div>

    <div class="tool-group size-group">
      <input type="range" id="sizeSlider" min="1" max="50" value="5" class="premium-slider">
      <span id="sizeValue" class="size-indicator">5px</span>
    </div>

    <div class="tool-group color-palette">
      <div class="color-dot active" data-color="#00ffcc" style="background-color: #00ffcc;"></div>
      <div class="color-dot" data-color="#ff007f" style="background-color: #ff007f;"></div>
      <div class="color-dot" data-color="#ffb703" style="background-color: #ffb703;"></div>
      <div class="color-dot" data-color="#0077b6" style="background-color: #0077b6;"></div>
      <div class="color-dot" id="dynamicWhiteBlack" data-color="#ffffff" style="background-color: #ffffff;"></div>
    </div>

    <div class="tool-group action-buttons">
      <button id="btnThemeToggle" class="circle-btn" title="切換畫布主題">🌙</button>
      <button id="btnUndo" class="circle-btn" title="撤銷上一筆">↩️</button>
      <button id="btnClear" class="circle-btn text-danger" title="全面清除重來">🗑️</button>
      <button id="btnSave" class="prime-btn save-btn">✨ 收藏作品</button>
    </div>
  </div>

  <div id="saveModal" class="modal-overlay">
    <div class="premium-modal-card animate-pop">
      <div class="modal-header">
        <h3>將靈感封存至藝術博物館</h3>
        <p>這幅作品將永久上傳至當代極簡展示牆</p>
      </div>
      <div class="modal-body">
        <div class="preview-box">
          <img id="previewImage" src="" alt="畫布縮圖預覽">
        </div>
        <div class="form-group">
          <label for="authorName">藝術家署名</label>
          <input type="text" id="authorName" maxlength="15" placeholder="請輸入您的奢華暱稱...">
        </div>
        <div class="form-group">
          <label for="authorComment">創作自白 / 留言故事</label>
          <textarea id="authorComment" rows="3" maxlength="80" placeholder="分享這幅畫背後的靈魂故事... (限 80 字)"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <span id="currentTimeStamp" class="serial-num">生成序號: --:--:--</span>
        <div class="btn-cluster">
          <button id="btnCloseModal" class="sec-btn">放棄返回</button>
          <button id="btnConfirmSubmit" class="prime-btn">收藏至藝術大畫廊 ✨</button>
        </div>
      </div>
    </div>
  </div>

  <div id="viewModal" class="modal-overlay">
    <div class="premium-showcase-card">
      <button id="btnCloseViewModal" class="close-card-btn">&times;</button>
      <div class="showcase-left">
        <div class="art-frame">
          <img id="viewImage" src="" alt="展出畫作大圖">
        </div>
      </div>
      <div class="showcase-right">
        <div class="meta-header">
          <span class="badge" id="viewBadge">ARTWORK DETAILS</span>
          <h2>管理你的作品</h2>
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorName">創作者署名</label>
          <input type="text" id="viewAuthorName" placeholder="修改藝術家暱稱...">
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorComment">創作自白 / 留言</label>
          <textarea id="viewAuthorComment" rows="3" placeholder="修改作品故事..."></textarea>
        </div>
        <div class="interactive-stats">
          <span id="viewTimeStamp" class="timestamp">發布時間: --:--</span>
          <span id="viewThemeTag" class="timestamp">主題: --</span>
        </div>
        <div class="management-btn-group">
          <button id="btnDownloadArt" class="manage-btn download">📥 下載作品</button>
          <button id="btnEditOnCanvas" class="manage-btn" style="background: #4a5568; color: #fff; display:none;">✏️ 回到畫布覆蓋編輯</button>
          <button id="btnDeleteArt" class="manage-btn delete" style="display: none;">🗑️ 銷毀作品</button>
        </div>
      </div>
    </div>
  </div>

  <script src="src/main.js"></script>
</body>
</html>
