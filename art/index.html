<!DOCTYPE html>
<html lang="zh-TW">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SketchWall - 頂級奢華藝術畫廊</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="src/main.js"></script>
  <script type="module" crossorigin src="./assets/index-CQHIwyid.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B11u1nql.css">
</head>
<body class="dark-theme">

  <a href="../index.html#projects" id="btnBackToPortfolio" class="back-portfolio-btn">
  <span>🏠 返回作品集主頁</span>
</a>

  <div id="welcomeOverlay" class="welcome-container">
    <div class="welcome-scroll-wrapper">
      
      <div class="welcome-card">
        <div class="brand-logo">🎨</div>
        <h1>SketchWall</h1>
        <p>歡迎來到極簡輕奢藝術畫廊。在這裡，您可以盡情釋放內心的色彩，將轉瞬即逝的靈感永遠刻印在雲端當代牆上。</p>
        <button id="btnStartExplore" class="prime-btn">進入創作世界 🚀</button>
      </div>
      
      <section class="gallery-section">
        <div class="gallery-header">
          <span class="gallery-badge">CONTEMPORARY EXHIBITION</span>
          <h2>當代線上藝術牆</h2>
          <p>匯聚全球創作者的靈感瞬間，點擊作品可進行收藏或管理</p>
        </div>
        
        <div id="galleryGrid" class="gallery-grid"></div>
        <p id="emptyGalleryText" class="empty-text" style="display: none;">目前尚無展出作品，快開啟創作留下你的第一幅鉅作！</p>
      </section>

    </div>
  </div>

  <main class="main-creative-section">
    <div class="canvas-wrapper">
      <canvas id="paintCanvas"></canvas>
    </div>
  </main>

  <div id="toolbar" class="luxury-toolbar hidden-ui">
    <div class="tool-group">
      <select id="selectTool" class="tool-select">
        <option value="pencil">🖌️ 靈感鉛筆</option>
        <option value="marker">🖊️ 內斂麥克筆</option>
        <option value="highlighter">🖍️ 螢光渲染筆</option>
        <option value="eraser">🧽 原子橡皮擦</option>
      </select>
    </div>

    <div class="tool-group slider-container">
      <span>粗細</span>
      <input type="range" id="sizeSlider" min="1" max="50" value="5">
      <span id="sizeValue">5px</span>
    </div>

    <div class="tool-group color-palette">
      <div class="color-dot active" data-color="#00ffcc" style="background-color: #00ffcc;"></div>
      <div class="color-dot" data-color="#ff0055" style="background-color: #ff0055;"></div>
      <div class="color-dot" data-color="#ffcc00" style="background-color: #ffcc00;"></div>
      <div class="color-dot" data-color="#007aff" style="background-color: #007aff;"></div>
      <div class="color-dot" id="dynamicWhiteBlack" data-color="#ffffff" style="background-color: #ffffff;"></div>
    </div>

    <div class="tool-group">
      <button id="btnThemeToggle" class="action-btn" title="切換晝夜主題">🌙</button>
      <button id="btnUndo" class="action-btn" title="撤銷上一筆">↩️</button>
      <button id="btnClear" class="action-btn" title="全面清空畫布">🗑️</button>
      <button id="btnSave" class="action-btn save-btn">收藏與發表 ✨</button>
    </div>
  </div>

  <div id="saveModal" class="modal-overlay">
    <div class="premium-showcase-card">
      <button id="btnCloseModal" class="close-card-btn">&times;</button>
      <div class="showcase-left">
        <div class="art-frame">
          <img id="previewImage" src="" alt="畫作預覽">
        </div>
      </div>
      <div class="showcase-right">
        <div class="meta-header">
          <span class="badge">MUSEUM CURATION</span>
          <h2>發表作品至雲端畫廊</h2>
        </div>
        <div class="input-fieldset">
          <label for="authorName">藝術家署名</label>
          <input type="text" id="authorName" placeholder="留下您的暱稱...">
        </div>
        <div class="input-fieldset">
          <label for="authorComment">創作自白 / 故事</label>
          <textarea id="authorComment" rows="4" placeholder="敘述這幅作品背後的靈感故事..."></textarea>
        </div>
        <div class="interactive-stats">
          <span id="currentTimeStamp" class="timestamp">生成序號: --:--</span>
        </div>
        <button id="btnConfirmSubmit" class="submit-art-btn">收藏至藝術大畫廊 ✨</button>
      </div>
    </div>
  </div>

  <div id="viewModal" class="modal-overlay">
    <div class="premium-showcase-card">
      <button id="btnCloseViewModal" class="close-card-btn">&times;</button>
      <div class="showcase-left">
        <div class="art-frame">
          <img id="viewImage" src="" alt="展出畫作大圖">
        </div>
      </div>
      <div class="showcase-right">
        <div class="meta-header">
          <span class="badge" id="viewBadge">ARTWORK DETAILS</span>
          <h2>管理你的作品</h2>
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorName">創作者署名</label>
          <input type="text" id="viewAuthorName" placeholder="修改藝術家暱稱...">
        </div>
        <div class="input-fieldset">
          <label for="viewAuthorComment">創作自白 / 留言</label>
          <textarea id="viewAuthorComment" rows="3" placeholder="修改作品故事..."></textarea>
        </div>
        <div class="interactive-stats">
          <span id="viewTimeStamp" class="timestamp">發布時間: --:--</span>
          <span id="viewThemeTag" class="timestamp">主題: --</span>
        </div>
        <div class="management-btn-group">
  <button id="btnDownloadArt" class="manage-btn download">📥 下載作品</button>
  
  <button id="btnEditOnCanvas" class="manage-btn" style="background: #4a5568; color: #fff; display: none;">🎨 重新編輯畫布</button>
  
  <button id="btnDeleteArt" class="manage-btn delete">🗑️ 刪除作品</button>
</div>
      </div>
    </div>
  </div>

</body>
</html>
