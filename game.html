<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <title>Gamer Hub // 雲端完美版 🎮</title>
  <style>
    :root {
      --bg-dark: #090d16;
      --panel-dark: #111827;
      --neon-cyan: #06b6d4;
      --neon-magenta: #ec4899;
      --neon-green: #10b981;
      --text-gray: #9ca3af;
    }

    body {
      background-color: var(--bg-dark);
      color: #f3f4f6;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
      background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: var(--text-gray); margin-bottom: 30px; }

    .search-container {
      display: flex; gap: 10px; width: 100%; max-width: 600px; margin-bottom: 40px;
    }
    #searchInput {
      flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #1f2937;
      background-color: var(--panel-dark); color: #fff; font-size: 1rem; outline: none;
    }
    #searchBtn {
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      color: white; border: none; padding: 14px 28px; border-radius: 8px;
      font-weight: bold; cursor: pointer; transition: opacity 0.2s;
    }
    #searchBtn:hover { opacity: 0.9; }

    .section-title {
      align-self: flex-start; max-width: 1200px; width: 100%; margin: 0 auto 20px auto;
      font-size: 1.5rem; color: var(--neon-cyan); letter-spacing: 1px;
    }

    .game-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px; width: 100%; max-width: 1200px; margin-bottom: 5px;
    }

    .game-card {
      background-color: var(--panel-dark); border: 1px solid #1f2937;
      border-radius: 12px; overflow: hidden; transition: all 0.3s; position: relative;
    }
    .game-card:hover {
      transform: translateY(-5px); border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }

    .game-thumb { width: 100%; height: 160px; object-fit: cover; background-color: #1f2937; }
    .game-info { padding: 20px; }
    .game-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 15px 0; }
    
    .price-row { display: flex; align-items: center; justify-content: space-between; }
    .discount-badge {
      background: linear-gradient(135deg, #b91c1c, #ef4444); color: #fff;
      font-weight: bold; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem;
    }
    .normal-price { color: var(--text-gray); text-decoration: line-through; font-size: 0.85rem; margin-right: 5px; }
    .sale-price { font-size: 1.2rem; font-weight: bold; }
    .free-text { color: var(--neon-green); text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }

    .track-btn {
      width: 100%; background-color: #1f2937; color: #cbd5e1; border: 1px solid #374151;
      padding: 10px; margin-top: 15px; border-radius: 6px; font-weight: bold;
      cursor: pointer; transition: all 0.2s;
    }
    .track-btn:hover {
      background-color: rgba(6, 182, 212, 0.1); color: var(--neon-cyan); border-color: var(--neon-cyan);
    }
  </style>
</head>
<body>

  <div id="authContainer" style="background: var(--panel-dark); border: 1px solid #1f2937; padding: 15px 20px; border-radius: 8px; width: 100%; max-width: 600px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
    <div id="authStatus" style="font-weight: bold; color: var(--neon-cyan);">🔒 狀態：尚未登入，目前使用測試帳號</div>
    
    <div id="authFields" style="display: flex; gap: 10px;">
      <input type="email" id="authEmail" placeholder="電子信箱 Email" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #374151; background: #090d16; color: #fff;">
      <input type="password" id="authPassword" placeholder="密碼 (至少6碼)" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #374151; background: #090d16; color: #fff;">
    </div>
    
    <div style="display: flex; gap: 10px;">
      <button id="loginBtn" style="flex: 1; background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;">登入</button>
      <button id="registerBtn" style="flex: 1; background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;">註冊新帳號</button>
      <button id="logoutBtn" style="flex: 1; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; display: none;">登出</button>
    </div>
  </div>

  <h1>Gamer Hub</h1>
  <div class="subtitle">即時同步全網最新數位遊戲特惠與全球遊戲庫搜尋</div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="輸入遊戲英文名稱... (例如: Witcher, Cyberpunk, Elden)">
    <button id="searchBtn">搜尋遊戲</button>
  </div>

  <div class="section-title" id="gridTitle">🔥 本週 Steam 焦點熱門特惠</div>
  <div class="game-grid" id="gameGrid"></div>

  <div style="margin-top: 60px; width: 100%; max-width: 1200px; border-top: 2px dashed #1f2937; padding-top: 40px;">
    <div class="section-title" style="color: var(--neon-magenta);">💖 我的願望牆 (已加入追蹤的遊戲)</div>
    <div class="game-grid" id="wishlistGrid">
      <p style="color: var(--text-gray);">目前願望清單空空如也...</p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB6_TjyUdF0EsR3reZeObF57JgUEe4gGLQ",
      authDomain: "my-portfolio-db-57c9b.firebaseapp.com",
      projectId: "my-portfolio-db-57c9b",
      storageBucket: "my-portfolio-db-57c9b.firebasestorage.app",
      messagingSenderId: "767568010946",
      appId: "1:767568010946:web:7ceb96cc02baf2dc5fe55b",
      measurementId: "G-GT57T3FH1T"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const BACKEND_URL = 'https://game-hub-six-zeta-16.vercel.app'; 
    let CURRENT_USER_ID = "test-user-123"; 

    const STORE_MAP = {
      "1": "Steam 商店",
      "2": "Playfield",
      "3": "Amazon",
      "7": "GOG 商店",
      "11": "Humble Store",
      "25": "Epic Games 商店"
    };

    const authStatus = document.getElementById('authStatus');
    const authFields = document.getElementById('authFields');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const gridContainer = document.getElementById('gameGrid');
    const gridTitle = document.getElementById('gridTitle');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const wishlistGrid = document.getElementById('wishlistGrid');

    auth.onAuthStateChanged((user) => {
      if (user) {
        CURRENT_USER_ID = user.uid; 
        authStatus.textContent = `🟢 已登入：${user.email}`;
        authFields.style.display = 'none';
        loginBtn.style.display = 'none';
        registerBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
      } else {
        CURRENT_USER_ID = "test-user-123"; 
        authStatus.textContent = `🔒 狀態：尚未登入，目前使用測試帳號`;
        authFields.style.display = 'flex';
        loginBtn.style.display = 'block';
        registerBtn.style.display = 'block';
        logoutBtn.style.display = 'none';
      }
      loadMyWishlist();
    });

    registerBtn.addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      if(!email || !password) return alert('請輸入帳密');
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        alert('🎉 帳號註冊成功並已自動登入！');
      } catch (err) { alert('註冊失敗：' + err.message); }
    });

    loginBtn.addEventListener('click', async () => {
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value.trim();
      if(!email || !password) return alert('請輸入帳密');
      try {
        await auth.signInWithEmailAndPassword(email, password);
        alert('👋 歡迎回來，登入成功！');
      } catch (err) { alert('登入失敗：' + err.message); }
    });

    logoutBtn.addEventListener('click', async () => {
      await auth.signOut();
      alert('🔒 已安全登出！');
    });

    async function loadDefaultDeals() {
      gridContainer.innerHTML = '<p style="color: var(--neon-cyan);">正在同步雲端特價資料...</p>';
      try {
        const response = await fetch('https://www.cheapshark.com/api/1.0/deals?storeID=1&pageSize=12');
        const deals = await response.json();
        gridContainer.innerHTML = '';

        deals.forEach(game => {
          const savings = Math.round(parseFloat(game.savings));
          const isFree = savings === 100 || parseFloat(game.salePrice) === 0;
          const card = document.createElement('div');
          card.className = 'game-card';
          
          // ✨ 修正點擊事件：使用安全轉義，避免單引號與 ${} 造成的 JS 崩潰
          const safeTitle = game.title.replace(/'/g, "\\'");
          
          card.innerHTML = `
            <img class="game-thumb" src="${game.thumb}" alt="${game.title}">
            <div class="game-info">
              <div class="game-title">${game.title}</div>
              <div class="price-row">
                <span class="discount-badge">-${savings}%</span>
                <div>
                  <span class="normal-price">$${game.normalPrice}</span>
                  <span class="sale-price ${isFree ? 'free-text' : ''}">${isFree ? 'FREE' : '$'+game.salePrice}</span>
                </div>
              </div>
              <button class="track-btn" onclick="promptTrackPriceWithStore('${game.gameID}', '${safeTitle}', '${game.thumb}', ${game.salePrice}, '1')">🎯 追蹤此折扣</button>
            </div>
          `;
          gridContainer.appendChild(card);
        });
      } catch (err) { console.error(err); }
    }

    async function searchGame() {
      const query = searchInput.value.trim();
      if (!query) return alert('請輸入遊戲名稱！');

      gridTitle.textContent = `🔍 搜尋 「${query}」 的結果：`;
      gridContainer.innerHTML = '<p style="color: var(--neon-cyan);">🔍 正在翻閱全球跨平台比價庫...</p>';

      try {
        const response = await fetch(`https://www.cheapshark.com/api/1.0/deals?title=${encodeURIComponent(query)}&pageSize=20`);
        const deals = await response.json();
        gridContainer.innerHTML = '';

        if (deals.length === 0) {
          gridContainer.innerHTML = '<p style="color: var(--text-gray);">❌ 找不到目前有折扣的項目，請嘗試輸入其他英文名稱</p>';
          return;
        }

        deals.forEach(deal => {
          const card = document.createElement('div');
          card.className = 'game-card';
          
          const currentPrice = parseFloat(deal.salePrice) === 0 ? '0.00' : deal.salePrice;
          const storeName = deal.storeID && STORE_MAP[deal.storeID] ? STORE_MAP[deal.storeID] : "其他數位商店";
          const isFree = parseFloat(currentPrice) === 0;
          const safeTitle = deal.title.replace(/'/g, "\\'");

          card.innerHTML = `
            <img class="game-thumb" src="${deal.thumb}" alt="${deal.title}">
            <div class="game-info">
              <div class="game-title">${deal.title}</div>
              <div style="margin-bottom: 12px; font-size: 0.9rem; background: #090d16; padding: 8px; border-radius: 6px;">
                <div style="color: ${isFree ? 'var(--neon-green)' : 'var(--neon-cyan)'}; font-weight: bold;">
                  💰 目前售價: $${currentPrice} USD ${isFree ? '(限時免費!)' : ''}
                </div>
                <div style="color: var(--text-gray); font-size: 0.8rem; margin-top: 4px;">
                  🛒 販賣網站: <span style="color: #fff; font-weight: bold;">${storeName}</span>
                </div>
              </div>
              <button class="track-btn" onclick="promptTrackPriceWithStore('${deal.gameID}', '${safeTitle}', '${deal.thumb}', ${currentPrice}, '${deal.storeID}')">🔔 加入願望清單</button>
            </div>
          `;
          gridContainer.appendChild(card);
        });
      } catch (err) {
        console.error('搜尋失敗:', err);
        gridContainer.innerHTML = '<p style="color: #ef4444;">❌ 搜尋失敗，請稍後再試！</p>';
      }
    }

    // 🟢 功能 3：進階版追蹤功能 (終極整合除錯防呆版)
    function promptTrackPriceWithStore(gameId, gameName, coverUrl, currentPrice, storeId) {
      const currentUser = firebase.auth().currentUser;
      let userEmail = "";
      let currentUid = CURRENT_USER_ID;

      if (currentUser) {
        userEmail = currentUser.email;
        currentUid = currentUser.uid; 
      } else {
        userEmail = "test-user-123@gmail.com"; 
      }

      // 🔍 這次絕對會彈出來的除錯提示窗！
      alert(`【發送前檢查】\n當前登入 UID: ${currentUid}\n抓到的 Email: "${userEmail}"`);

      const targetPrice = prompt(`請輸入追蹤 【${gameName}】 的心理期望價 (美金 USD)：`, "29.99");
      if (targetPrice === null || targetPrice === "") return;

      const payload = {
        userId: currentUid, 
        userEmail: userEmail,   
        userEMail: userEmail,   
        gameId: gameId,
        gameName: gameName,
        coverUrl: coverUrl,
        targetPrice: parseFloat(targetPrice),
        currentPrice: currentPrice ? parseFloat(currentPrice) : 0,
        storeId: storeId || "1"
      };

      fetch(`${BACKEND_URL}/api/wishlist`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert(data.message);
          loadMyWishlist(); 
        } else {
          alert(`❌ 失敗了：${data.message}`);
        }
      })
      .catch(err => alert('❌ 無法連線到後端 Node.js 伺服器'));
    }

    // 🌟 舊版相容轉接頭
    function promptTrackPrice(gameId, gameName, coverUrl, currentPrice) {
      promptTrackPriceWithStore(gameId, gameName, coverUrl, currentPrice, "1");
    }

    function addToWishlist(gameName, coverUrl, currentPrice) {
      const gameId = gameName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      promptTrackPriceWithStore(gameId, gameName, coverUrl, currentPrice, "1");
    }

    searchBtn.addEventListener('click', searchGame);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchGame(); });

    async function loadMyWishlist() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/wishlist/${CURRENT_USER_ID}`);
        const result = await response.json();
        
        if (!result.success || result.data.length === 0) {
          wishlistGrid.innerHTML = '<p style="color: var(--text-gray);">目前沒有追蹤任何遊戲，快去搜尋加入吧！</p>';
          return;
        }

        wishlistGrid.innerHTML = ''; 

        result.data.forEach(wish => {
          const card = document.createElement('div');
          card.className = 'game-card';
          
          if (wish.currentPrice && wish.targetPrice && parseFloat(wish.currentPrice) <= parseFloat(wish.targetPrice)) {
            card.style.borderColor = 'var(--neon-green)';
            card.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.2)';
          }

          const storeName = wish.storeId && STORE_MAP[wish.storeId] ? STORE_MAP[wish.storeId] : "Steam 商店";

          card.innerHTML = `
            <img class="game-thumb" src="${wish.coverUrl || 'https://placehold.co/400x200/111827/FFFFFF?text=No+Image'}" alt="${wish.gameName}">
            <div class="game-info">
              <div class="game-title" style="color: var(--neon-magenta);">${wish.gameName}</div>
              
              <div style="margin-bottom: 15px; font-size: 0.9rem; background: #090d16; padding: 10px; border-radius: 6px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                  <span style="color: var(--text-gray);">🎯 你的心理價:</span>
                  <span style="color: #fff; font-weight:bold;">$${wish.targetPrice}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                  <span style="color: var(--text-gray);">💰 目前市場價:</span>
                  <span style="color: ${parseFloat(wish.currentPrice) <= parseFloat(wish.targetPrice) ? 'var(--neon-green)' : '#fff'}; font-weight:bold;">$${wish.currentPrice}</span>
                </div>
                <div style="display:flex; justify-content:space-between; border-top: 1px solid #1f2937; margin-top: 6px; padding-top: 6px;">
                  <span style="color: var(--text-gray);">🌐 販賣網站:</span>
                  <span style="color: var(--neon-cyan); font-weight:bold; font-size: 0.85rem;">${storeName}</span>
                </div>
              </div>

              <button class="track-btn" style="background-color: #991b1b; color: #fca5a5; border-color: #7f1d1d;" 
                      onclick="deleteFromWishlist('${wish.id}')">🗑️ 取消追蹤</button>
            </div>
          `;
          wishlistGrid.appendChild(card);
        });
      } catch (err) {
        console.error("無法載入願望清單:", err);
      }
    }

    async function deleteFromWishlist(docId) {
      if (!confirm("確定要取消追蹤這款遊戲嗎？")) return;

      try {
        const response = await fetch(`${BACKEND_URL}/api/wishlist/${docId}`, {
          method: 'DELETE'
        });
        const result = await response.json();

        if (result.success) {
          alert("🗑️ 已成功移除追蹤！");
          loadMyWishlist(); 
        } else {
          alert("移除失敗：" + result.message);
        }
      } catch (err) {
        alert("無法連線到後端伺服器進行刪除");
      }
    }

    loadDefaultDeals();
    loadMyWishlist();
  </script>
</body>
</html>
