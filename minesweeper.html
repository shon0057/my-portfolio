<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掃地雷 - 雲端同步版</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #94a3b8;
            --card-bg: #ffffff;
            --cell-unrevealed: #e2e8f0;
            --cell-revealed: #f8fafc;
            --cell-border: #64748b;
            --text-main: #1e293b;
            --accent-red: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin: 0 0 16px 0;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background-color: #f1f5f9;
            padding: 8px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: bold;
            color: #475569;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 32px);
            gap: 2px;
            background-color: var(--cell-border);
            padding: 2px;
            border-radius: 6px;
            margin: 0 auto 16px auto;
            width: max-content;
        }

        .cell {
            background-color: var(--cell-unrevealed);
            border-radius: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .cell:hover:not(.revealed) {
            background-color: #cbd5e1;
        }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
        }

        .cell.mine {
            background-color: #fecaca;
        }

        .cell.flag {
            background-color: #fef08a;
        }

        /* 數字顏色 */
        .cell[data-count="1"] { color: #2563eb; }
        .cell[data-count="2"] { color: #16a34a; }
        .cell[data-count="3"] { color: #dc2626; }
        .cell[data-count="4"] { color: #7c3aed; }
        .cell[data-count="5"] { color: #9a3412; }
        .cell[data-count="6"] { color: #0891b2; }
        .cell[data-count="7"] { color: #1e293b; }
        .cell[data-count="8"] { color: #64748b; }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        /* 彈出視窗樣式優化 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .result-box {
            background-color: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            max-width: 380px;
            width: 90%;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-box h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .result-box p {
            color: #64748b;
            margin: 0 0 16px 0;
            font-size: 0.95rem;
        }

        /* 🖥️ 排行榜表格樣式 */
        .leaderboard-section {
            margin: 16px 0;
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            max-height: 200px;
            overflow-y: auto;
        }

        .leaderboard-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 8px;
            text-align: left;
            border-left: 4px solid #2563eb;
            padding-left: 6px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .leaderboard-table th {
            color: #64748b;
            font-weight: 600;
            padding: 4px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }

        .leaderboard-table td {
            padding: 6px 4px;
            vertical-align: middle;
            text-align: left;
            color: #334155;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .player-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #cbd5e1;
            object-fit: cover;
        }

        .rank-badge {
            font-weight: bold;
            width: 18px;
            display: inline-block;
            text-align: center;
        }
        .rank-1 { color: #eab308; } /* 金 */
        .rank-2 { color: #94a3b8; } /* 銀 */
        .rank-3 { color: #b45309; } /* 銅 */

        .view-mode-btn {
            background-color: #64748b;
            margin-right: 8px;
        }
        .view-mode-btn:hover {
            background-color: #475569;
        }

        /* 殘局檢視模式 */
        .overlay.view-mode {
            background-color: transparent;
            backdrop-filter: none;
            pointer-events: none;
        }
        .overlay.view-mode .result-box {
            display: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1 id="game-title">💣 掃地雷 - 雲端同步版</h1>
        
        <div class="status-bar">
            <div>🚩 剩餘地雷: <span id="mine-count">10</span></div>
            <div>⏱️ 耗時: <span id="timer">000</span> 秒</div>
        </div>

        <div class="grid" id="grid"></div>

        <button class="btn" id="reset-btn">重新開始</button>
    </div>

    <div class="overlay" id="overlay" onclick="handleOverlayClick()">
        <div class="result-box" onclick="event.stopPropagation()">
            <h2 id="result-title">🎉 任務達成</h2>
            <p id="result-desc">你完美避開了所有地雷！</p>
            
            <div class="leaderboard-section">
                <div class="leaderboard-title">🏆 雲端同步世界天梯榜 (前5名)</div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th style="width: 15%">名次</th>
                            <th style="width: 55%">玩家</th>
                            <th style="width: 30%; text-align: right;">成績 (秒)</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr>
                            <td colspan="3" style="text-align: center; color: #94a3b8; padding: 10px;">排行榜讀取中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="display: flex; justify-content: center;">
                <button class="btn view-mode-btn" onclick="toggleViewMode(event)">🔍 查看殘局</button>
                <button class="btn" onclick="initGame()">再玩一局</button>
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 🔥 Firebase Config 初始化配置
        // ----------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyB6_TjyUdF0EsR3reZeObF57JgUEe4gGLQ",
            authDomain: "my-portfolio-db-57c9b.firebaseapp.com",
            projectId: "my-portfolio-db-57c9b",
            storageBucket: "my-portfolio-db-57c9b.firebasestorage.app",
            messagingSenderId: "767568010946",
            appId: "1:767568010946:web:7ceb96cc02baf2dc5fe55b",
            measurementId: "G-GT57T3FH1T"
        };

        let db = null;
        if (typeof firebase !== 'undefined') {
            if (firebase.apps.length === 0) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            console.log("【遊戲內部】Firebase Firestore 初始化成功！");
        } else {
            console.error("【遊戲內部】找不到 Firebase SDK，請確認頂部有引入 script。");
        }

        // ----------------------------------------------------
        // 🔐 跨網域通訊監聽：接收來自 index.html 的登入狀態
        // ----------------------------------------------------
        let currentUser = null;

        window.addEventListener('message', (event) => {
            if (!event.data) return;
            if (event.data.type === 'AUTH_CHANGE' || event.data.type === 'PORTFOLIO_AUTH_STATE') {
                currentUser = event.data.user;
                const gameTitle = document.getElementById('game-title');
                if (gameTitle) {
                    if (currentUser) {
                        gameTitle.textContent = `💣 掃地雷 (玩家: ${currentUser.displayName || '已登入'})`;
                        console.log("【遊戲內部】成功接收主網頁登入狀態:", currentUser.displayName);
                    } else {
                        gameTitle.textContent = "💣 掃地雷 - 雲端同步版";
                        console.log("【遊戲內部】目前為訪客（未登入）狀態");
                    }
                }
            }
        });

        // ----------------------------------------------------
        // 🎮 遊戲核心邏輯變數
        // ----------------------------------------------------
        const SIZE = 10;
        const MINE_NUM = 10;
        let board = [];
        let mines = new Set();
        let flags = new Set();
        let revealedCount = 0;
        let isGameOver = false;
        let isFirstClick = true;
        let gameId = 0;

        let timerInterval = null;
        let timeElapsed = 0;

        const gridEl = document.getElementById('grid');
        const mineCountEl = document.getElementById('mine-count');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');

        // ----------------------------------------------------
        // ⏱️ 計時器機制
        // ----------------------------------------------------
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timeElapsed = 0;
            timerEl.textContent = "000";
            timerInterval = setInterval(() => {
                timeElapsed++;
                if (timeElapsed > 999) timeElapsed = 999;
                timerEl.textContent = String(timeElapsed).padStart(3, '0');
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // ----------------------------------------------------
        // 🛠️ 遊戲初始化
        // ----------------------------------------------------
        function initGame() {
            gameId++;
            stopTimer();
            timeElapsed = 0;
            timerEl.textContent = "000";
            
            isGameOver = false;
            isFirstClick = true;
            revealedCount = 0;
            mines.clear();
            flags.clear();
            
            overlay.style.display = 'none';
            overlay.classList.remove('view-mode');
            gridEl.style.pointerEvents = 'auto';
            mineCountEl.textContent = MINE_NUM;

            gridEl.innerHTML = '';
            board = [];

            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    board[r][c] = {
                        r: r, c: c,
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0
                    };

                    const cellEl = document.createElement('div');
                    cellEl.id = `cell-${r}-${c}`;
                    cellEl.className = 'cell';
                    
                    cellEl.addEventListener('click', () => handleLeftClick(r, c));
                    cellEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });

                    gridEl.appendChild(cellEl);
                }
            }
        }

        // 布雷（確保第一下絕對不踩雷）
        function generateMines(firstR, firstC) {
            while (mines.size < MINE_NUM) {
                let r = Math.floor(Math.random() * SIZE);
                let c = Math.floor(Math.random() * SIZE);
                if (Math.abs(r - firstR) <= 1 && Math.abs(c - firstC) <= 1) continue;
                mines.add(`${r},${c}`);
                board[r][c].isMine = true;
            }

            // 計算四周地雷數
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c].isMine) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            let nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc].isMine) {
                                count++;
                            }
                        }
                    }
                    board[r][c].neighborMines = count;
                }
            }
        }

        // ----------------------------------------------------
        // 👆 玩家點擊操作
        // ----------------------------------------------------
        function handleLeftClick(r, c) {
            if (isGameOver || board[r][c].isRevealed || board[r][c].isFlagged) return;

            if (isFirstClick) {
                isFirstClick = false;
                generateMines(r, c);
                startTimer();
            }

            if (board[r][c].isMine) {
                triggerGameOver(false);
                return;
            }

            revealCell(r, c);

            if (revealedCount === SIZE * SIZE - MINE_NUM) {
                triggerGameOver(true);
            }
        }

        function handleRightClick(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;

            const cellEl = document.getElementById(`cell-${r}-${c}`);
            if (board[r][c].isFlagged) {
                board[r][c].isFlagged = false;
                flags.delete(`${r},${c}`);
                cellEl.classList.remove('flag');
                cellEl.textContent = '';
            } else {
                if (flags.size >= MINE_NUM) return;
                board[r][c].isFlagged = true;
                flags.add(`${r},${c}`);
                cellEl.classList.add('flag');
                cellEl.textContent = '🚩';
            }
            mineCountEl.textContent = MINE_NUM - flags.size;
        }

        // 遞迴翻開格子
        // ----------------------------------------------------
        // 🌊 遞迴翻開格子：形成經典波浪擴散效果
        // ----------------------------------------------------
        function revealCell(r, c) {
            // 超出邊界、已翻開或已被插旗的格子就不處理
            if (r < 0 || r >= SIZE || c < 0 || c >= SIZE || board[r][c].isRevealed || board[r][c].isFlagged) return;

            board[r][c].isRevealed = true;
            revealedCount++;
            
            const cellEl = document.getElementById(`cell-${r}-${c}`);
            cellEl.classList.add('revealed'); // 觸發 CSS transition 動畫

            if (board[r][c].neighborMines > 0) {
                // 如果周圍有地雷，顯示數字，停止擴散
                cellEl.textContent = board[r][c].neighborMines;
                cellEl.setAttribute('data-count', board[r][c].neighborMines);
            } else {
                // 🚀 空白格子：利用 setTimeout 或直接遞迴往周圍 8 個方向擴散開來！
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        revealCell(r + dr, c + dc);
                    }
                }
            }
        }

        // ----------------------------------------------------
        // 🏆 遊戲勝利：分數雲端同步
        // ----------------------------------------------------
        function gameWin(finalTime) {
            console.log("🎉 遊戲勝利！花費秒數:", finalTime);

            if (!currentUser) {
                console.log("💡 目前為訪客身分，分數將不儲存到雲端。");
                return; 
            }

            if (!db) {
                console.error("❌ 錯誤：Firestore 資料庫尚未初始化成功。");
                return;
            }

            console.log("🚀 正在將分數寫入 Firebase Firestore...");
            db.collection('minesweeper_scores').add({
                uid: currentUser.uid,
                name: currentUser.displayName || '匿名玩家',
                photoURL: currentUser.photoURL || '',
                score: Number(finalTime), 
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                console.log("✅ 【雲端同步】分數已成功寫入！");
                // 上傳成功後，即時刷新排行榜
                loadLeaderboard();
            })
            .catch((error) => {
                console.error("❌ 分數上傳失敗:", error.message);
            });
        }

        // ----------------------------------------------------
        // 📊 讀取並渲染雲端排行榜
        // ----------------------------------------------------
        function loadLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            if (!tbody) return;

            if (!db) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #ef4444;">資料庫未連線</td></tr>`;
                return;
            }

            // 查詢 minesweeper_scores 集合：依分數(秒數)從小到大排序，取前 5 名
            db.collection('minesweeper_scores')
                .orderBy('score', 'asc')
                .limit(5)
                .get()
                .then((querySnapshot) => {
                    tbody.innerHTML = ''; // 清空加載中文字
                    
                    if (querySnapshot.empty) {
                        tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #94a3b8;">目前尚無高分紀錄！快來搶佔第一名！</td></tr>`;
                        return;
                    }

                    let rank = 1;
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const score = data.score;
                        const name = data.name || '匿名玩家';
                        const photoURL = data.photoURL || '';

                        // 判斷前三名獎牌樣式
                        let rankClass = '';
                        if (rank <= 3) rankClass = `rank-${rank}`;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><span class="rank-badge ${rankClass}">${rank}</span></td>
                            <td>
                                <div class="player-info">
                                    <img class="player-avatar" src="${photoURL || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_144dp.png'}" onerror="this.src='https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_144dp.png'">
                                    <span style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${name}</span>
                                </div>
                            </td>
                            <td style="text-align: right; font-weight: bold; color: #2563eb;">${score} 秒</td>
                        `;
                        tbody.appendChild(tr);
                        rank++;
                    });
                })
                .catch((error) => {
                    console.error("❌ 讀取排行榜失敗:", error);
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #ef4444;">排行榜載入失敗</td></tr>`;
                });
        }

        // ----------------------------------------------------
        // 🏁 判定遊戲結束
        // ----------------------------------------------------
        function triggerGameOver(win) {
            if (isGameOver) return;
            isGameOver = true;
            stopTimer(); 

            // 🚀 不管輸贏，彈出視窗前先載入最新排行榜（默默在背景讀取）
            loadLeaderboard();

            if (!win) {
                // 💥 失敗動畫：讓盤面上所有的地雷隨機在 0 ~ 0.4 秒內逐一爆發，形成波浪爆炸感！
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c].isMine) {
                            const el = document.getElementById(`cell-${r}-${c}`);
                            const currentId = gameId;
                            
                            // 這裡就是你的波浪引爆靈魂！
                            setTimeout(() => {
                                if (currentId !== gameId) return; // 防止新一局干擾舊局
                                el.classList.add('revealed', 'mine');
                                el.textContent = '💣';
                            }, Math.random() * 400); 
                        }
                    }
                }
            } else {
                // 🏆 勝利：呼叫雲端上傳機制
                gameWin(timeElapsed);
            }

            // 🕒 延遲 800 毫秒再彈出排行榜與結果視窗，確保玩家能看完地雷全部爆炸的動畫！
            setTimeout(() => {
                resultTitle.textContent = win ? "🎉 任務達成" : "💀 遊戲結束";
                resultDesc.textContent = win ? `你完美避開地雷！耗時 ${timeElapsed} 秒。` : "踩到地雷了，下次再加油。";
                overlay.style.display = 'flex';
            }, 800);
        }

        // ----------------------------------------------------
        // 🔍 殘局檢視模式切換
        // ----------------------------------------------------
        function toggleViewMode(e) {
            if(e) e.stopPropagation();
            overlay.classList.toggle('view-mode');
            
            if (overlay.classList.contains('view-mode')) {
                gridEl.style.pointerEvents = 'none';
            } else {
                gridEl.style.pointerEvents = 'auto';
            }
        }

        function handleOverlayClick() {
            if (isGameOver && overlay.classList.contains('view-mode')) {
                toggleViewMode();
            }
        }

        overlay.addEventListener('contextmenu', (e) => {
            if (isGameOver && overlay.classList.contains('view-mode')) {
                e.preventDefault();
                toggleViewMode();
            }
        });

        document.getElementById('reset-btn').onclick = initGame;
        window.onload = initGame;
    </script>
</body>
</html>
