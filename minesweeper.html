<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掃地雷 - 雲端同步版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root {
            --bg-color: #94a3b8;
            --card-bg: #ffffff;
            --cell-unrevealed: #e2e8f0;
            --cell-revealed: #f8fafc;
            --cell-border: #64748b;
            --text-main: #1e293b;
            --accent-red: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            user-select: none;
            position: relative;
            transform-origin: center center;
            transition: transform 0.2s ease;
        }

        @media (max-width: 480px) {
            .game-card {
                padding: 12px;
                border-radius: 12px;
                transform: scale(clamp(0.65, calc(100vw / 440), 0.95));
            }
        }

        @media (max-width: 340px) {
            .game-card {
                padding: 8px;
                transform: scale(0.65) !important;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-main);
        }

        .status-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .display-box {
            font-weight: bold;
            font-family: monospace;
            font-size: 24px;
            padding: 4px 12px;
            border-radius: 8px;
            min-width: 40px;
            text-align: center;
        }

        .mine-count {
            color: var(--accent-red);
            background: #fee2e2;
        }

        .timer-count {
            color: #059669;
            background: #d1fae5;
        }

        .reset-btn {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .reset-btn:hover { background-color: #e2e8f0; transform: translateY(-1px); }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 38px);
            grid-template-rows: repeat(10, 38px);
            gap: 2px;
            background-color: var(--cell-border);
            border: 3px solid var(--cell-border);
            border-radius: 4px;
        }

        .cell {
            width: 38px;
            height: 38px;
            background-color: var(--cell-unrevealed);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            cursor: pointer;
            font-size: 18px;
            box-shadow: inset 1px 1px 0 white, inset -1px -1px 0 rgba(0,0,0,0.1);
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cell.mine { background-color: #fca5a5 !important; }
        .cell.flagged::after { content: "🚩"; font-size: 18px; }

        .n1 { color: #2563eb; }
        .n2 { color: #16a34a; }
        .n3 { color: #dc2626; }
        .n4 { color: #1e3a8a; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background 0.3s ease;
        }

        .overlay.view-mode {
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: none;
            cursor: pointer;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 320px;
            width: 90%;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
        }

        .overlay.view-mode .modal {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .primary-btn {
            background: #1e293b;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .secondary-btn {
            background: #f1f5f9;
            color: #475569;
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #view-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            pointer-events: none;
            z-index: 102;
        }

        .overlay.view-mode #view-hint {
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <div class="header">
            <div class="title" id="game-title">掃地雷</div>
            <div class="status-panel">
                <div id="timer" class="display-box timer-count">000</div>
                <div id="mines-left" class="display-box mine-count">12</div>
                <button class="reset-btn" id="reset-btn">重設</button>
            </div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h1 id="result-title" style="margin:0 0 10px 0"></h1>
            <p id="result-desc" style="color: #64748b; margin-bottom: 25px"></p>
            <div class="btn-group">
                <button class="primary-btn" onclick="initGame()">再玩一局</button>
                <button class="secondary-btn" onclick="toggleViewMode(event)">查看版面</button>
            </div>
        </div>
        <div id="view-hint">點擊任意鍵或右鍵返回結果畫面</div>
    </div>
    <script>
// ----------------------------------------------------
        // 🔐 全域使用者變數 與 跨網域通訊監聽
        // ----------------------------------------------------
        // ----------------------------------------------------
        // 🔥 Firebase Config 設定（iframe 內部也必須獨立初始化）
        // ----------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyB6_TjyUdF0EsR3reZeObF57JgUEe4gGLQ",
            authDomain: "my-portfolio-db-57c9b.firebaseapp.com",
            projectId: "my-portfolio-db-57c9b",
            storageBucket: "my-portfolio-db-57c9b.firebasestorage.app",
            messagingSenderId: "767568010946",
            appId: "1:767568010946:web:7ceb96cc02baf2dc5fe55b",
            measurementId: "G-GT57T3FH1T"
        };

        // 確保遊戲內部只初始化一次，並成功建立 db 連線
        let db = null;
        if (typeof firebase !== 'undefined') {
            if (firebase.apps.length === 0) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore(); // 🚀 這行成功，db 就不再是 null 了！
            console.log("【遊戲內部】Firebase Firestore 初始化成功！");
        } else {
            console.error("【遊戲內部】找不到 Firebase SDK，請確認網頁頂部有引入 script。");
        }

        // ----------------------------------------------------
        // 🔐 跨網域通訊監聽：接收主網頁傳來的登入狀態
        // ----------------------------------------------------
        let currentUser = null; 

        window.addEventListener('message', (event) => {
            if (!event.data) return;

            // 支援主網頁發出的兩種事件 type
            if (event.data.type === 'AUTH_CHANGE' || event.data.type === 'PORTFOLIO_AUTH_STATE') {
                currentUser = event.data.user; 
                
                // 動態在遊戲內政更新玩家暱稱提示
                const gameTitle = document.querySelector('h1') || document.getElementById('game-title');
                if (gameTitle) {
                    if (currentUser) {
                        gameTitle.textContent = `💣 掃地雷 (玩家: ${currentUser.displayName || '已連動'})`;
                        console.log("【遊戲內部】成功接收主網頁登入狀態:", currentUser.displayName);
                    } else {
                        gameTitle.textContent = "💣 掃地雷 - 雲端同步版";
                        console.log("【遊戲內部】目前為訪客（未登入）狀態");
                    }
                }
            }
        });

        // ----------------------------------------------------
        // 🏆 遊戲勝利：分數雲端同步
        // ----------------------------------------------------
        function gameWin(timeElapsed) {
            clearInterval(timer);
            isGameOver = true;
            
            console.log("🎉 遊戲勝利！花費秒數:", timeElapsed);

            // 1. 檢查有沒有登入資料
            if (!currentUser) {
                console.log("💡 目前為訪客身分，過關分數不會上傳至雲端天梯榜。");
                return; 
            }

            // 2. 檢查資料庫連線實例是否存在
            if (!db) {
                console.error("❌ 錯誤：Firestore 資料庫 (db) 尚未初始化成功，無法上傳分數！");
                alert("資料庫連線失敗，無法同步分數。");
                return;
            }

            console.log("🚀 正在將分數寫入 Firebase Firestore...");
            
            // 3. 安全地寫入 Firestore
            db.collection('minesweeper_scores').add({
                uid: currentUser.uid,
                name: currentUser.displayName || '匿名玩家',
                photoURL: currentUser.photoURL || '',
                score: timeElapsed, // 存入秒數
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                console.log("✅ 【雲端同步】分數已成功寫入 minesweeper_scores 集合！");
                // 如果你有寫載入排行榜的方法，可以在這裡執行：
                // if (typeof loadLeaderboard === 'function') loadLeaderboard();
            })
            .catch((error) => {
                console.error("❌ 分數上傳失敗，請檢查 Firebase Database 的 Rules 規則:", error.message);
            });
        }

        // --- 🎮 遊戲核心邏輯區 ---
        const SIZE = 10;
        const MINES = 12;
        let board = [];
        let revealedCount = 0;
        let isGameOver = false;
        let isFirstClick = true;
        let flags = new Set();
        let gameId = 0; 

        let timerInterval = null;
        let timeElapsed = 0;

        const gridEl = document.getElementById('grid');
        const mineDisplay = document.getElementById('mines-left');
        const timerDisplay = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');

        function initGame() {
            gameId++; 
            board = [];
            revealedCount = 0;
            isGameOver = false;
            isFirstClick = true;
            flags.clear();
            
            stopTimer();
            timeElapsed = 0;
            timerDisplay.textContent = "000";

            overlay.style.display = 'none';
            overlay.classList.remove('view-mode');
            gridEl.style.pointerEvents = 'auto'; // 恢復網格可點擊狀態
            mineDisplay.textContent = MINES;
            gridEl.innerHTML = '';

            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, count: 0 };
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    
                    cell.onclick = () => {
                        if (isGameOver) return;
                        handleLeftClick(r, c);
                    };

                    cell.oncontextmenu = (e) => { 
                        e.preventDefault(); 
                        if (isGameOver) return;
                        handleRightClick(r, c); 
                    };

                    let touchTimeout;
                    cell.addEventListener('touchstart', () => {
                        if (isGameOver) return;
                        touchTimeout = setTimeout(() => {
                            handleRightClick(r, c);
                            if (navigator.vibrate) navigator.vibrate(50);
                        }, 600);
                    }, { passive: true });

                    cell.addEventListener('touchend', () => clearTimeout(touchTimeout));
                    cell.addEventListener('touchmove', () => clearTimeout(touchTimeout));

                    gridEl.appendChild(cell);
                }
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeElapsed++;
                if (timeElapsed <= 999) {
                    timerDisplay.textContent = String(timeElapsed).padStart(3, '0');
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function generateMines(firstR, firstC) {
            let placed = 0;
            const safeZone = new Set();
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    safeZone.add(`${firstR + dr},${firstC + dc}`);
                }
            }

            while (placed < MINES) {
                let r = Math.floor(Math.random() * SIZE);
                let c = Math.floor(Math.random() * SIZE);
                if (!board[r][c].isMine && !safeZone.has(`${r},${c}`)) {
                    board[r][c].isMine = true;
                    placed++;
                }
            }

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c].isMine) continue;
                    let minesAround = 0;
                    getNeighbors(r, c).forEach(n => {
                        if (board[n.r][n.c].isMine) minesAround++;
                    });
                    board[r][c].count = minesAround;
                }
            }
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        neighbors.push({ r: nr, c: nc });
                    }
                }
            }
            return neighbors;
        }

        function handleLeftClick(r, c) {
            if (isGameOver || board[r][c].revealed || board[r][c].flagged) return;

            if (isFirstClick) {
                isFirstClick = false;
                generateMines(r, c);
                startTimer();
            }

            if (board[r][c].isMine) {
                triggerGameOver(false);
            } else {
                revealRecursive(r, c, 0, gameId);
            }
        }

        function revealRecursive(r, c, depth, currentId) {
            if (currentId !== gameId || isGameOver || board[r][c].revealed || board[r][c].flagged) return;

            // 【邏輯同步優化】在點擊當下立刻鎖定狀態並增加計數，不等待 setTimeout
            board[r][c].revealed = true;
            revealedCount++;

            // 檢查是否達成勝利條件（放在同步區，避免手速過快造成 race condition）
            const isWinTriggered = (revealedCount === (SIZE * SIZE) - MINES);
            if (isWinTriggered) {
                triggerGameOver(true);
            }

            setTimeout(() => {
                if (currentId !== gameId) return; 
                // 如果輸了，非地雷的格子就不再繼續播翻開動畫
                if (isGameOver && !isWinTriggered && !board[r][c].isMine) return;

                const el = document.getElementById(`cell-${r}-${c}`);
                if (!el) return;
                el.classList.add('revealed');
                
                if (board[r][c].count > 0) {
                    el.textContent = board[r][c].count;
                    el.classList.add(`n${board[r][c].count}`);
                }
            }, depth * 30);

            if (board[r][c].count === 0) {
                getNeighbors(r, c).forEach(n => {
                    revealRecursive(n.r, n.c, depth + 1, currentId);
                });
            }
        }

        function handleRightClick(r, c) {
            // 【UX修正】遊戲結束後不允許再插旗/拔旗
            if (isGameOver || board[r][c].revealed) return;

            const el = document.getElementById(`cell-${r}-${c}`);
            if (!board[r][c].flagged) {
                board[r][c].flagged = true;
                flags.add(`${r},${c}`);
                el.classList.add('flagged');
            } else {
                board[r][c].flagged = false;
                flags.delete(`${r},${c}`);
                el.classList.remove('flagged');
            }
            mineDisplay.textContent = MINES - flags.size;
        }

        function triggerGameOver(win) {
            if (isGameOver) return;
            isGameOver = true;
            stopTimer(); 

            if (!win) {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c].isMine) {
                            const el = document.getElementById(`cell-${r}-${c}`);
                            const currentId = gameId;
                            setTimeout(() => {
                                if (currentId !== gameId) return;
                                el.classList.add('revealed', 'mine');
                                el.textContent = '💣';
                            }, Math.random() * 400); 
                        }
                    }
                }
            } else {
                gameWin(timeElapsed);
            }

            setTimeout(() => {
                resultTitle.textContent = win ? "🎉 任務達成" : "💀 遊戲結束";
                resultDesc.textContent = win ? `你完美避開地雷！耗時 ${timeElapsed} 秒。` : "踩到地雷了，下次再加油。";
                overlay.style.display = 'flex';
            }, 800);
        }

        function toggleViewMode(e) {
            if(e) e.stopPropagation();
            overlay.classList.toggle('view-mode');
            
            // 【UX優化】進入查看殘局模式時，鎖定盤面不可點擊，滑鼠指標變回預設
            if (overlay.classList.contains('view-mode')) {
                gridEl.style.pointerEvents = 'none';
            } else {
                gridEl.style.pointerEvents = 'auto';
            }
        }

        function handleOverlayClick() {
            if (isGameOver && overlay.classList.contains('view-mode')) {
                toggleViewMode();
            }
        }

        overlay.addEventListener('contextmenu', (e) => {
            if (isGameOver && overlay.classList.contains('view-mode')) {
                e.preventDefault();
                toggleViewMode();
            }
        });

        document.getElementById('reset-btn').onclick = initGame;
        window.onload = initGame;
    </script>
</body>
</html>
