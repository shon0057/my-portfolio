<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掃地雷 - 右鍵返回功能</title>
    <style>
        :root {
            --bg-color: #94a3b8;
            --card-bg: #ffffff;
            --cell-unrevealed: #e2e8f0;
            --cell-revealed: #f8fafc;
            --cell-border: #64748b;
            --text-main: #1e293b;
            --accent-red: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            user-select: none;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-main);
        }

        .status-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mine-count {
            color: var(--accent-red);
            font-weight: bold;
            font-family: monospace;
            font-size: 24px;
            background: #fee2e2;
            padding: 4px 12px;
            border-radius: 8px;
            min-width: 40px;
            text-align: center;
        }

        .reset-btn {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .reset-btn:hover { background-color: #e2e8f0; transform: translateY(-1px); }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 38px);
            grid-template-rows: repeat(10, 38px);
            gap: 2px;
            background-color: var(--cell-border);
            border: 3px solid var(--cell-border);
            border-radius: 4px;
        }

        .cell {
            width: 38px;
            height: 38px;
            background-color: var(--cell-unrevealed);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            cursor: pointer;
            font-size: 18px;
            box-shadow: inset 1px 1px 0 white, inset -1px -1px 0 rgba(0,0,0,0.1);
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .cell.mine { background-color: #fca5a5 !important; }
        .cell.flagged::after { content: "🚩"; font-size: 18px; }

        .n1 { color: #2563eb; }
        .n2 { color: #16a34a; }
        .n3 { color: #dc2626; }
        .n4 { color: #1e3a8a; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: background 0.3s ease;
        }

        /* 查看版面模式的樣式 */
        .overlay.view-mode {
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: none;
            cursor: alias; /* 提示使用者可以點擊 */
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 320px;
            width: 90%;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
        }

        .overlay.view-mode .modal {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .primary-btn {
            background: #1e293b;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .secondary-btn {
            background: #f1f5f9;
            color: #475569;
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 提示文字 */
        #view-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            pointer-events: none;
            z-index: 102;
        }

        .overlay.view-mode #view-hint {
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <div class="header">
            <div class="title">掃地雷</div>
            <div class="status-panel">
                <div id="mines-left" class="mine-count">10</div>
                <button class="reset-btn" id="reset-btn">重設</button>
            </div>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <h1 id="result-title" style="margin:0 0 10px 0"></h1>
            <p id="result-desc" style="color: #64748b; margin-bottom: 25px"></p>
            <div class="btn-group">
                <button class="primary-btn" onclick="initGame()">再玩一局</button>
                <button class="secondary-btn" onclick="toggleViewMode()">查看版面</button>
            </div>
        </div>
        <div id="view-hint">點擊右鍵返回結果畫面</div>
    </div>

    <script>
        const SIZE = 10;
        const MINES = 12;
        let board = [];
        let revealedCount = 0;
        let isGameOver = false;
        let isFirstClick = true;
        let flags = new Set();

        const gridEl = document.getElementById('grid');
        const mineDisplay = document.getElementById('mines-left');
        const overlay = document.getElementById('overlay');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');

        function initGame() {
            board = [];
            revealedCount = 0;
            isGameOver = false;
            isFirstClick = true;
            flags.clear();
            overlay.style.display = 'none';
            overlay.classList.remove('view-mode');
            mineDisplay.textContent = MINES;
            gridEl.innerHTML = '';

            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    board[r][c] = { r, c, isMine: false, revealed: false, flagged: false, count: 0 };
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleLeftClick(r, c);
                    cell.oncontextmenu = (e) => { 
                        e.preventDefault(); 
                        handleRightClick(r, c); 
                    };
                    gridEl.appendChild(cell);
                }
            }
        }

        function generateMines(firstR, firstC) {
            let placed = 0;
            const safeZone = new Set();
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    safeZone.add(`${firstR + dr},${firstC + dc}`);
                }
            }

            while (placed < MINES) {
                let r = Math.floor(Math.random() * SIZE);
                let c = Math.floor(Math.random() * SIZE);
                if (!board[r][c].isMine && !safeZone.has(`${r},${c}`)) {
                    board[r][c].isMine = true;
                    placed++;
                }
            }

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c].isMine) continue;
                    let minesAround = 0;
                    getNeighbors(r, c).forEach(n => {
                        if (board[n.r][n.c].isMine) minesAround++;
                    });
                    board[r][c].count = minesAround;
                }
            }
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        neighbors.push({ r: nr, c: nc });
                    }
                }
            }
            return neighbors;
        }

        function handleLeftClick(r, c) {
            if (isGameOver || board[r][c].revealed || board[r][c].flagged) return;

            if (isFirstClick) {
                isFirstClick = false;
                generateMines(r, c);
            }

            if (board[r][c].isMine) {
                triggerGameOver(false);
            } else {
                revealRecursive(r, c, 0);
            }
        }

        function revealRecursive(r, c, depth) {
            if (isGameOver || board[r][c].revealed || board[r][c].flagged) return;

            board[r][c].revealed = true;
            revealedCount++;

            setTimeout(() => {
                if (isGameOver && !board[r][c].isMine) return;

                const el = document.getElementById(`cell-${r}-${c}`);
                el.classList.add('revealed');
                
                if (board[r][c].count > 0) {
                    el.textContent = board[r][c].count;
                    el.classList.add(`n${board[r][c].count}`);
                }

                if (revealedCount === (SIZE * SIZE) - MINES && !isGameOver) {
                    triggerGameOver(true);
                }
            }, depth * 30);

            if (board[r][c].count === 0) {
                getNeighbors(r, c).forEach(n => {
                    revealRecursive(n.r, n.c, depth + 1);
                });
            }
        }

        function handleRightClick(r, c) {
            // 如果遊戲結束且在查看模式，右鍵點擊任何地方都會返回
            if (isGameOver && overlay.classList.contains('view-mode')) {
                toggleViewMode();
                return;
            }

            if (isGameOver || board[r][c].revealed) return;

            const el = document.getElementById(`cell-${r}-${c}`);
            if (!board[r][c].flagged) {
                board[r][c].flagged = true;
                flags.add(`${r},${c}`);
                el.classList.add('flagged');
            } else {
                board[r][c].flagged = false;
                flags.delete(`${r},${c}`);
                el.classList.remove('flagged');
            }
            mineDisplay.textContent = MINES - flags.size;
        }

        function triggerGameOver(win) {
            if (isGameOver) return;
            isGameOver = true;

            if (!win) {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (board[r][c].isMine) {
                            const el = document.getElementById(`cell-${r}-${c}`);
                            setTimeout(() => {
                                el.classList.add('revealed', 'mine');
                                el.textContent = '💣';
                            }, Math.random() * 400); 
                        }
                    }
                }
            }

            setTimeout(() => {
                resultTitle.textContent = win ? "🎉 任務達成" : "💀 遊戲結束";
                resultDesc.textContent = win ? "你完美的避開了所有地雷！" : "踩到地雷了，下次再加油。";
                overlay.style.display = 'flex';
            }, 800);
        }

        function toggleViewMode() {
            overlay.classList.toggle('view-mode');
        }

        // 全域右鍵事件監聽，用於查看模式返回
        overlay.addEventListener('contextmenu', (e) => {
            if (isGameOver && overlay.classList.contains('view-mode')) {
                e.preventDefault();
                toggleViewMode();
            }
        });

        document.getElementById('reset-btn').onclick = initGame;
        window.onload = initGame;
    </script>
</body>
</html>
